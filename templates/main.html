<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耗材查询 · 管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 20px;
            background: #eef2ff;
            background-image:
                radial-gradient(ellipse 600px 400px at 10% 20%, rgba(99,102,241,0.15) 0%, transparent 70%),
                radial-gradient(ellipse 500px 500px at 90% 70%, rgba(59,130,246,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 400px 300px at 50% 90%, rgba(139,92,246,0.10) 0%, transparent 70%);
            color: #111827;
            line-height: 1.65;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 10px;
            padding: 28px;
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3B82F6, #6366F1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.7);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .user-info {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #111827, #6366F1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
            box-shadow: 0 4px 14px rgba(239,68,68,0.3);
            transition: all 0.2s;
        }
        .logout-btn:hover {
            background: #dc2626;
            box-shadow: 0 6px 20px rgba(239,68,68,0.35);
        }
        .query-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .query-bar input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
            background: rgba(255,255,255,0.7);
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #111827;
        }
        .query-bar input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .query-bar button {
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
            box-shadow: 0 4px 14px rgba(59,130,246,0.4);
            transition: all 0.2s;
        }
        .query-bar button:hover {
            background: #2563EB;
            box-shadow: 0 6px 20px rgba(59,130,246,0.45);
        }
        .result-area {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 15px;
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }
        .result-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .result-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3B82F6, #6366F1);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .result-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(99,102,241,0.10);
        }
        .result-card:hover::before { opacity: 1; }
        .result-field {
            margin-bottom: 6px;
            line-height: 1.6;
            word-break: break-word;
            font-size: 14px;
        }
        .field-label {
            font-weight: 700;
            display: inline-block;
            width: 100px;
            color: #6B7280;
        }
        .field-value { color: #111827; }
        .loading {
            text-align: center;
            padding: 20px;
            color: #6B7280;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="user-info">{{ display_name }}（{{ username }}）</div>
        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
    <div class="query-bar">
        <input type="text" id="keywordInput" placeholder="请输入编号/名称关键词" autocomplete="off">
        <button id="queryBtn">查询</button>
    </div>
    <div id="resultArea" class="result-area">
        <div class="loading">输入关键词开始查询...</div>
    </div>
</div>
<script>
    async function performQuery() {
        const keyword = document.getElementById('keywordInput').value.trim();
        if (!keyword) { alert('请输入查询关键词'); return; }
        const resultDiv = document.getElementById('resultArea');
        resultDiv.innerHTML = '<div class="loading">查询中...</div>';
        try {
            const response = await fetch(`/api/query?keyword=${encodeURIComponent(keyword)}`, { credentials: 'include' });
            const data = await response.json();
            if (data.success) {
                const voList = data.data || [];
                if (voList.length === 0) {
                    resultDiv.innerHTML = '<div class="loading">未找到相关记录</div>';
                } else {
                    let allHtml = '';
                    voList.forEach(item => {
                        let concentration = item.concentration || '';
                        if (concentration && item.concentrationUnitName) concentration += ' ' + item.concentrationUnitName;
                        let spec = item.standard || '—';
                        let specConc = spec !== '—' ? spec : '';
                        if (concentration) specConc = specConc ? specConc + ' / ' + concentration : concentration;
                        let validNum = item.validNum != null ? item.validNum + (item.numUnitName ? ' ' + item.numUnitName : '') : '—';
                        allHtml += `<div class="result-card">
                            <div class="result-field"><span class="field-label">编号：</span><span class="field-value">${escapeHtml(item.customNum) || '—'}</span></div>
                            <div class="result-field"><span class="field-label">名称：</span><span class="field-value">${escapeHtml(item.name) || '—'}</span></div>
                            <div class="result-field"><span class="field-label">CAS号：</span><span class="field-value">${escapeHtml(item.casNo) || '—'}</span></div>
                            <div class="result-field"><span class="field-label">规格/浓度：</span><span class="field-value">${escapeHtml(specConc) || '—'}</span></div>
                            <div class="result-field"><span class="field-label">有效期：</span><span class="field-value">${escapeHtml(item.validDate) || '—'}</span></div>
                            <div class="result-field"><span class="field-label">生产厂家：</span><span class="field-value">${escapeHtml(item.factoryName) || '—'}</span></div>
                            <div class="result-field"><span class="field-label">储存条件：</span><span class="field-value">${escapeHtml(item.storageCondition) || '—'}</span></div>
                            <div class="result-field"><span class="field-label">剩余数量：</span><span class="field-value">${escapeHtml(validNum)}</span></div>
                        </div>`;
                    });
                    resultDiv.innerHTML = allHtml;
                }
            } else {
                if (data.message.includes('会话已失效') || data.message.includes('未登录')) {
                    window.location.href = '/login';
                } else {
                    resultDiv.innerHTML = `<div class="loading" style="color:#ef4444;">查询失败: ${escapeHtml(data.message)}</div>`;
                }
            }
        } catch (err) {
            resultDiv.innerHTML = `<div class="loading" style="color:#ef4444;">请求异常: ${err.message}</div>`;
        }
    }
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    async function logout() {
        await fetch('/api/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/login';
    }
    document.getElementById('queryBtn').addEventListener('click', performQuery);
    document.getElementById('keywordInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') performQuery(); });
</script>
</body>
</html>
