<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Lims管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #eef2ff;
            background-image:
                radial-gradient(ellipse 600px 400px at 10% 20%, rgba(99,102,241,0.15) 0%, transparent 70%),
                radial-gradient(ellipse 500px 500px at 90% 70%, rgba(59,130,246,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 400px 300px at 50% 90%, rgba(139,92,246,0.10) 0%, transparent 70%);
            color: #111827;
        }
        .login-container {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 10px;
            width: 400px;
            max-width: 100%;
            padding: 32px;
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3B82F6, #6366F1);
        }
        .title {
            text-align: center;
            margin-bottom: 28px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #111827, #6366F1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.7);
        }
        .error-msg {
            background: rgba(254,215,215,0.7);
            color: #c53030;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #6B7280;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
            background: rgba(255,255,255,0.7);
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #111827;
        }
        input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 45px; }
        .toggle-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #6B7280;
            padding: 4px 6px;
        }
        .toggle-password:hover { color: #111827; }
        .captcha-row { display: flex; gap: 10px; align-items: center; }
        .captcha-row input { flex: 1; }
        .captcha-img {
            width: 100px;
            height: 38px;
            background: rgba(255,255,255,0.5);
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            object-fit: contain;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            background: #3B82F6;
            color: white;
            box-shadow: 0 4px 14px rgba(59,130,246,0.4);
        }
        .btn:hover {
            background: #2563EB;
            box-shadow: 0 6px 20px rgba(59,130,246,0.45);
        }
        .note {
            font-size: 12px;
            color: #6B7280;
            text-align: center;
            margin-timsop: 20px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="title">Lims管理系统</div>
    <div id="errorMsg" class="error-msg">{{ error }}</div>
    <form method="post" action="/api/login" id="loginForm">
        <div class="form-group">
            <label>账号</label>
            <input type="text" name="username" placeholder="请输入账号" autocomplete="username" value="{{ username }}" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <div class="password-wrapper">
                <input type="password" name="password" id="passwordInput" placeholder="请输入密码" autocomplete="current-password" required>
                <button type="button" class="toggle-password" id="togglePasswordBtn" title="显示/隐藏密码">👁️</button>
            </div>
        </div>
        <div class="form-group">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="text" name="captcha" placeholder="请输入验证码" autocomplete="off" required>
                <img id="captchaImg" class="captcha-img" src="{{ captcha_url }}" alt="验证码" title="点击刷新" onclick="refreshCaptcha()">
            </div>
        </div>
        <input type="hidden" name="client_ua" id="clientUaField" value="">
        <input type="hidden" name="next" value="/">
        <button type="submit" class="btn">登 录</button>
    </form>
    <div class="note">点击刷新验证码 · 登录成功后可保存密码</div>
</div>
<script>
    const error = "{{ error }}";
    if (error) document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('togglePasswordBtn').addEventListener('click', function() {
        const pwd = document.getElementById('passwordInput');
        if (pwd.type === 'password') { pwd.type = 'text'; this.textContent = '🙈'; }
        else { pwd.type = 'password'; this.textContent = '👁️'; }
    });
    async function refreshCaptcha() {
        const resp = await fetch('/api/captcha');
        const data = await resp.json();
        if (data.success) document.getElementById('captchaImg').src = data.image;
        else alert('获取验证码失败，请稍后重试');
    }
    document.getElementById('loginForm').addEventListener('submit', function() {
        document.getElementById('clientUaField').value = navigator.userAgent;
    });
</script>
</body>
</html>
